apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-demo
  template:         # This must align with 'selector'
    metadata:
      labels:
        app: html-demo
    spec:
      containers:
        - name: html-demo
          image: thamizhkarthik05/html-demo:latest
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service
spec:
  type: NodePort
  selector:
    app: html-demo
  ports:            # This must be inside 'spec'
  - port: 80
    targetPort: 80
    nodePort: 30010
